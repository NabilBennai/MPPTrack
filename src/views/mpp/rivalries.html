<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rivalités · MPP Track</title>
  <link rel="stylesheet" href="/css/output.css" />
</head>
<body class="app-shell" style="min-height:100dvh;background:#0C1320;color:#F1F5F9;font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased">
<header style="position:sticky;top:0;z-index:20;background:#111827;border-bottom:1px solid rgba(148,163,184,.09)">
  <div class="mpp-header-inner px-5 sm:px-8" style="height:56px;display:flex;align-items:center;gap:16px">
    <a href="/" style="display:flex;align-items:center;gap:11px;text-decoration:none"><div style="width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.28)">⚽</div><span class="font-oswald" style="font-size:20px;font-weight:700;letter-spacing:.14em;color:#F1F5F9">MPP<span style="color:#22C55E">TRACK</span></span></a>
    <details class="mpp-nav-menu"><summary class="mpp-nav-toggle" aria-label="Ouvrir le menu de navigation"><span></span><span></span><span></span></summary><nav class="mpp-nav-links" style="display:flex;gap:3px;margin-left:4px;flex-wrap:wrap">
      <a href="/" style="padding:5px 10px;border-radius:7px;text-decoration:none;font-size:12px;font-weight:700;color:#475569">Classement</a>
      <a href="/movements" style="padding:5px 10px;border-radius:7px;text-decoration:none;font-size:12px;font-weight:700;color:#475569">Mouvements</a>
      <a href="/rivalries" aria-current="page" style="padding:5px 10px;border-radius:7px;text-decoration:none;font-size:12px;font-weight:700;color:#F1F5F9;background:rgba(255,255,255,.06)">Rivalités</a>
      <a href="/form" style="padding:5px 10px;border-radius:7px;text-decoration:none;font-size:12px;font-weight:700;color:#475569">Forme</a>
      <a href="/distributions" style="padding:5px 10px;border-radius:7px;text-decoration:none;font-size:12px;font-weight:700;color:#475569">Distributions</a>
        <a href="/history" style="padding:5px 10px;border-radius:7px;text-decoration:none;font-size:12px;font-weight:700;color:#475569">Historique</a>
        <a href="/timeline" style="padding:5px 10px;border-radius:7px;text-decoration:none;font-size:12px;font-weight:700;color:#475569">Timeline</a>
      <a href="/duel" style="padding:5px 10px;border-radius:7px;text-decoration:none;font-size:12px;font-weight:700;color:#475569">Duel</a>
    </nav></details>
  </div>
</header>
<main class="px-5 sm:px-8" style="max-width:1180px;margin:0 auto;padding-top:22px;padding-bottom:48px">
  <!-- Rivalités automatiques -->
  <section id="rivalry-panel" style="flex-shrink:0;border-radius:14px;border:1px solid rgba(34,197,94,.16);background:linear-gradient(135deg,rgba(34,197,94,.07),rgba(17,24,39,1) 42%);padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.25)">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
      <div>
        <h2 class="font-oswald" style="margin:0;color:#F1F5F9;font-size:17px;letter-spacing:.08em">RIVALITÉS 24H</h2>
        <p id="rivalry-period" style="margin:2px 0 0;color:#64748B;font-size:11px;font-family:'Manrope',sans-serif">Génère un commentaire automatique sur les duels proches.</p>
      </div>
      <button onclick="loadRivalryReport()" title="Générer le rapport rivalités"
        style="padding:7px 12px;border-radius:9px;border:1px solid rgba(34,197,94,.28);background:rgba(34,197,94,.10);color:#86EFAC;cursor:pointer;font-size:12px;font-weight:800;font-family:'Manrope',sans-serif;letter-spacing:.01em">🎙️ Générer le rapport</button>
    </div>
    <div id="rivalry-report" style="display:none;margin-top:12px;border-radius:12px;border:1px solid rgba(148,163,184,.09);background:#0C1320;padding:14px;font-family:'Manrope',sans-serif"></div>
  </section>


</main>
<script>
// ── Mouvements 24h ───────────────────────────────────────────────────────
function fmtRank(value) { return value === null || value === undefined ? '—' : '#' + value; }
function fmtPoints(value) { return value === null || value === undefined ? '—' : String(value); }
function fmtSigned(value) { return value > 0 ? '+' + value : String(value); }
function fmtMovementDate(value) {
  if (!value) return '—';
  return new Date(value).toLocaleString('fr-FR', { dateStyle: 'short', timeStyle: 'short' });
}
function escMovementHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function movementCard(title, item, mode) {
  if (!item) {
    return `<article style="border-radius:12px;border:1px solid rgba(148,163,184,.09);background:#0C1320;padding:14px;color:#64748B;font-size:13px;font-family:'Manrope',sans-serif">
      <strong style="display:block;color:#F1F5F9;margin-bottom:12px">${title}</strong>Aucune donnée disponible.
    </article>`;
  }
  const isPoints = mode === 'points';
  const delta = isPoints ? item.pointsDelta : item.rankDelta;
  const color = delta >= 0 ? '#22C55E' : '#EF4444';
  const previous = isPoints ? fmtPoints(item.previousPoints) : fmtRank(item.previousDepartmentRank);
  const current = isPoints ? fmtPoints(item.currentPoints) : fmtRank(item.currentDepartmentRank);
  const label = isPoints ? 'points' : 'rang dép.';
  return `<article style="border-radius:12px;border:1px solid rgba(148,163,184,.09);background:#0C1320;padding:14px;font-family:'Manrope',sans-serif">
    <strong style="display:block;color:#F1F5F9;font-size:13px;margin-bottom:10px">${title}</strong>
    <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px">
      <span style="color:#E2E8F0;font-weight:800;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escMovementHtml(item.pseudo)}</span>
      <span style="color:${color};font-weight:900;font-size:18px">${fmtSigned(delta)}</span>
    </div>
    <div style="margin-top:8px;color:#94A3B8;font-size:12px">${label} : ${previous} → ${current}</div>
    <div style="margin-top:4px;color:#475569;font-size:11px">Global : ${fmtRank(item.previousGlobalRank)} → ${fmtRank(item.currentGlobalRank)} · Points : ${fmtPoints(item.previousPoints)} → ${fmtPoints(item.currentPoints)}</div>
  </article>`;
}
async function loadMovements() {
  const grid = document.getElementById('movements-grid');
  const period = document.getElementById('movements-period');
  if (!grid) return;
  try {
    const response = await fetch('/api/movements?hours=24');
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const data = await response.json();
    const movements = Array.isArray(data.movements) ? data.movements : [];
    const eligibleRanks = movements.filter(m => m.previousDepartmentRank !== null && m.currentDepartmentRank !== null);
    const eligiblePoints = movements.filter(m => m.previousPoints !== null && m.currentPoints !== null);
    const topProgression = [...eligibleRanks].sort((a, b) => b.rankDelta - a.rankDelta)[0];
    const topChute = [...eligibleRanks].sort((a, b) => a.rankDelta - b.rankDelta)[0];
    const topPoints = [...eligiblePoints].sort((a, b) => b.pointsDelta - a.pointsDelta)[0];
    period.textContent = data.previousCapturedAt && data.currentCapturedAt
      ? `Snapshots comparés : ${fmtMovementDate(data.previousCapturedAt)} → ${fmtMovementDate(data.currentCapturedAt)} (${data.windowHours || 24}h glissantes)`
      : 'Deux snapshots sont nécessaires pour calculer les mouvements 24h.';
    grid.innerHTML = [
      movementCard('Top progression', topProgression, 'rank'),
      movementCard('Top chute', topChute, 'rank'),
      movementCard('Plus gros gain de points', topPoints, 'points'),
    ].join('');
  } catch (_err) {
    period.textContent = 'Mouvements indisponibles pour le moment.';
    grid.innerHTML = `<div style="grid-column:1/-1;color:#EF4444;border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:14px;background:rgba(239,68,68,.06);font-size:13px;font-family:'Manrope',sans-serif">Erreur lors du chargement des mouvements.</div>`;
  }
}
document.addEventListener('DOMContentLoaded', loadMovements);


// ── Rivalités automatiques ───────────────────────────────────────────────
function rivalryList(items, empty, render) {
  return items.length ? `<ul style="margin:10px 0 0;padding-left:18px;color:#CBD5E1;font-size:13px;line-height:1.65">${items.map(render).join('')}</ul>` : `<p style="margin:10px 0 0;color:#64748B;font-size:13px">${empty}</p>`;
}
function renderRivalryReport(data) {
  const duels = Array.isArray(data.tightDuels) ? data.tightDuels : [];
  const overtakes = Array.isArray(data.overtakes) ? data.overtakes : [];
  const chasers = Array.isArray(data.hotChasers) ? data.hotChasers : [];
  return `<div style="display:flex;align-items:flex-start;gap:10px">
    <div style="font-size:24px;line-height:1">🎙️</div>
    <div style="min-width:0;flex:1">
      <strong style="display:block;color:#F1F5F9;font-size:15px;margin-bottom:6px">Le commentaire du jour</strong>
      <p style="margin:0;color:#E2E8F0;font-size:14px;line-height:1.55">${escMovementHtml(data.headline || 'Le classement se tient en respect aujourd’hui.')}</p>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3" style="margin-top:14px">
        <div><strong style="color:#86EFAC;font-size:12px;text-transform:uppercase;letter-spacing:.08em">Duels serrés</strong>${rivalryList(duels, 'Aucun duel proche détecté.', d => `<li><b>${escMovementHtml(d.chaser)}</b> chasse ${escMovementHtml(d.leader)} : ${d.gap} pt${Number(d.gap) > 1 ? 's' : ''} d’écart (#${d.chaserRank} → #${d.leaderRank}).</li>`)}</div>
        <div><strong style="color:#93C5FD;font-size:12px;text-transform:uppercase;letter-spacing:.08em">Dépassements</strong>${rivalryList(overtakes, 'Pas de dépassement sur la fenêtre.', o => `<li><b>${escMovementHtml(o.pseudo)}</b> passe de #${o.previousRank} à #${o.currentRank} (${fmtSigned(o.rankDelta)} rang, ${fmtSigned(o.pointsDelta)} pts).</li>`)}</div>
        <div><strong style="color:#FDE68A;font-size:12px;text-transform:uppercase;letter-spacing:.08em">Joueurs chauds</strong>${rivalryList(chasers, 'Aucun gain de points notable.', c => `<li><b>${escMovementHtml(c.pseudo)}</b> engrange ${fmtSigned(c.pointsDelta)} pts et pointe #${c.currentRank}.</li>`)}</div>
      </div>
    </div>
  </div>`;
}
async function loadRivalryReport() {
  const box = document.getElementById('rivalry-report');
  const period = document.getElementById('rivalry-period');
  if (!box) return;
  box.style.display = 'block';
  box.innerHTML = `<div style="color:#64748B;font-size:13px">Le consultant chauffe sa voix…</div>`;
  try {
    const response = await fetch('/api/rivalry-report?hours=24');
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const data = await response.json();
    period.textContent = data.previousCapturedAt && data.currentCapturedAt
      ? `Rapport basé sur ${fmtMovementDate(data.previousCapturedAt)} → ${fmtMovementDate(data.currentCapturedAt)}.`
      : 'Deux snapshots sont nécessaires pour un rapport complet.';
    box.innerHTML = renderRivalryReport(data);
  } catch (_err) {
    period.textContent = 'Rapport rivalités indisponible pour le moment.';
    box.innerHTML = `<div style="color:#EF4444;font-size:13px">Impossible de générer le rapport rivalités.</div>`;
  }
}


document.addEventListener('DOMContentLoaded', loadRivalryReport);

</script>
</body>
</html>
