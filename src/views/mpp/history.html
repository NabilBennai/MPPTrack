<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historique · MPP Track</title>
  <link rel="stylesheet" href="/css/output.css">
</head>
<body style="min-height:100dvh;background:#0C1320;color:#F1F5F9;font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased">

<header style="position:sticky;top:0;z-index:20;background:#111827;border-bottom:1px solid rgba(148,163,184,.09)">
  <div class="app-header-inner px-5 sm:px-8" style="height:56px;display:flex;align-items:center;gap:16px">
    <a href="/" style="display:flex;align-items:center;gap:11px;text-decoration:none">
      <div style="width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.28)">⚽</div>
      <span class="font-oswald" style="font-size:20px;font-weight:700;letter-spacing:0.14em;color:#F1F5F9">MPP<span style="color:#22C55E">TRACK</span></span>
    </a>
    <nav style="display:flex;gap:3px;margin-left:4px">
      <a href="/" style="padding:5px 10px;border-radius:7px;color:#475569;text-decoration:none;font-size:12px;font-weight:700"
        onmouseover="this.style.color='#F1F5F9';this.style.background='rgba(255,255,255,.06)'"
        onmouseout="this.style.color='#475569';this.style.background='transparent'">Classement</a>
      <a href="/history" aria-current="page" style="padding:5px 10px;border-radius:7px;color:#F1F5F9;background:rgba(255,255,255,.06);text-decoration:none;font-size:12px;font-weight:700">Historique</a>
    </nav>
    <div class="history-header-actions" style="margin-left:auto;display:flex;align-items:center;gap:12px">
      <span id="live-badge" style="display:none;align-items:center;gap:6px;font-size:11px;color:#475569;font-weight:700">
        <span style="width:6px;height:6px;border-radius:50%;background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,.2)"></span>LIVE
      </span>
      <button id="export-btn" hidden onclick="downloadExport()"
        style="display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;border:1px solid rgba(148,163,184,.13);background:rgba(255,255,255,.04);color:#64748B;font:700 11px Manrope,sans-serif;cursor:pointer;text-transform:uppercase;letter-spacing:.08em"
        onmouseover="this.style.background='rgba(255,255,255,.08)';this.style.color='#F1F5F9'"
        onmouseout="this.style.background='rgba(255,255,255,.04)';this.style.color='#64748B'">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 6l3 3 3-3M1 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Export PNG
      </button>
      <label style="display:flex;align-items:center;gap:8px;font-size:11px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.08em">
        Période
        <select id="range-select" style="border-radius:8px;padding:5px 9px;font-size:12px;font-family:'Manrope',sans-serif;cursor:pointer;outline:none;border:1px solid rgba(148,163,184,.12);color:#F1F5F9;background:#1A2335">
          <option value="1">24 heures</option>
          <option value="7" selected>7 jours</option>
          <option value="30">30 jours</option>
          <option value="90">90 jours</option>
        </select>
      </label>
    </div>
  </div>
</header>

<main class="history-main px-5 sm:px-8" style="max-width:1440px;margin:0 auto;padding-top:20px;padding-bottom:48px">

  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:8px;padding:5px 11px;border-radius:9px;background:rgba(147,51,234,.08);border:1px solid rgba(147,51,234,.2)">
      <span style="width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:#9333EA;color:#fff;font:700 10px 'Oswald',sans-serif">ES</span>
      <span style="font-size:11px;font-weight:800;color:#C084FC;text-transform:uppercase;letter-spacing:.1em">e-SCM</span>
      <span id="member-count" style="font-size:11px;color:#64748B;font-weight:700"></span>
    </div>
    <span id="snapshot-info" style="font-size:11px;color:#475569;font-weight:600"></span>
    <span id="diff-mode-label" style="margin-left:auto;font-size:10px;color:#334155;font-weight:700;text-transform:uppercase;letter-spacing:.08em"></span>
  </div>

  <div id="empty-state" hidden style="padding:72px 24px;text-align:center;border:1px dashed rgba(148,163,184,.15);border-radius:16px;background:rgba(34,197,94,.03)">
    <div style="width:52px;height:52px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:#22C55E;background:rgba(34,197,94,.10);font-size:26px">⌁</div>
    <h2 class="font-oswald" style="font-size:24px;color:#F1F5F9;letter-spacing:.04em">CHRONOLOGIE VIDE</h2>
    <p style="max-width:480px;margin:8px auto 16px;color:#64748B;font-size:13px">Aucun instantané enregistré. Le premier apparaîtra après l'exécution du cron.</p>
    <code style="color:#22C55E;font-size:11px">GET /api/cron/snapshot</code>
  </div>

  <div id="dashboard" class="history-dashboard-panel" hidden style="border:1px solid rgba(148,163,184,.09);border-radius:16px;background:#111827;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.3)">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div>
        <p id="chart-eyebrow" style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:#475569">Trajectoire e-SCM</p>
        <h2 id="chart-title" class="font-oswald" style="font-size:18px;letter-spacing:.04em;color:#F1F5F9;margin-top:3px">Évolution du classement</h2>
      </div>
      <div class="rank-mode-switch" role="group" style="display:flex;gap:3px;padding:3px;border:1px solid rgba(148,163,184,.09);border-radius:9px;background:#0C1320">
        <button type="button" data-mode="global">Rang global</button>
        <button type="button" data-mode="escm">Rang e-SCM</button>
        <button type="button" data-mode="points">Points</button>
      </div>
    </div>

    <!-- Rank chart (SVG) -->
    <div id="rank-chart-wrap" style="position:relative;border:1px solid rgba(147,51,234,.1);border-radius:12px;background:radial-gradient(ellipse at 50% -10%,rgba(147,51,234,.06),transparent 55%),#0C1320;overflow:hidden">
      <div id="chart-tooltip" hidden style="position:absolute;z-index:4;min-width:190px;padding:10px 12px;border:1px solid rgba(147,51,234,.28);border-radius:10px;background:rgba(15,20,30,.97);box-shadow:0 12px 32px rgba(0,0,0,.6);pointer-events:none;backdrop-filter:blur(10px)"></div>
      <div id="rank-chart" style="width:100%;min-height:clamp(320px,55vw,480px)"></div>
    </div>

    <!-- Points leaderboard (HTML, replaces chart in points mode) -->
    <div id="points-board" hidden style="border:1px solid rgba(34,197,94,.1);border-radius:12px;background:#0C1320;overflow:hidden">
      <div id="points-board-inner"></div>
    </div>
  </div>
</main>

<script>
const COLORS = ['#A855F7','#22C55E','#3B9EFF','#FBBF24','#F97316','#06B6D4','#F43F5E','#8B5CF6'];
const dateFmt = new Intl.DateTimeFormat('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', timeZone:'Europe/Paris' });
const numFmt  = new Intl.NumberFormat('fr-FR');
const esc = v => String(v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
let rankMode = 'global';
let currentData = null;

// ── Points vertical axis ─────────────────────────────────────────────────
function renderPointsBoard(series, liveDataAvailable) {
  const sorted = [...series].sort((a, b) => b.currentPoints - a.currentPoints);
  if (!sorted.length) return;

  const n      = sorted.length;
  const maxPts = sorted[0].currentPoints;
  const minPts = sorted[n - 1].currentPoints;
  const range  = Math.max(maxPts - minPts, 1);

  const W = 620, AX = 220, PT = 36, PB = 32;
  const plotH = Math.max(280, n * 44);
  const H     = plotH + PT + PB;

  const yOf = pts => PT + (1 - (pts - minPts) / range) * plotH;

  // Dots at true proportional position; labels start there then de-collide
  const nodes = sorted.map((s, idx) => ({
    s, idx,
    color: COLORS[idx % COLORS.length],
    pts: s.currentPoints,
    rawY: yOf(s.currentPoints),
    y:    yOf(s.currentPoints),
    side: 'right',
  }));

  // Assign sides: when consecutive dots are within threshold, alternate
  const CLOSE = 42;
  for (let i = 1; i < n; i++) {
    const gap = nodes[i].rawY - nodes[i-1].rawY;
    nodes[i].side = gap < CLOSE ? (nodes[i-1].side === 'right' ? 'left' : 'right') : 'right';
  }

  // De-collide each side independently — half the players means much smaller nudges
  const MIN_GAP = 24, floor = H - PB - 6;
  ['right', 'left'].forEach(side => {
    const g = nodes.filter(nd => nd.side === side);
    for (let i = 1; i < g.length; i++)
      if (g[i].y - g[i-1].y < MIN_GAP) g[i].y = g[i-1].y + MIN_GAP;
    for (let i = g.length - 1; i >= 0; i--) {
      if (g[i].y > floor) g[i].y = floor;
      if (i > 0 && g[i-1].y > g[i].y - MIN_GAP) g[i-1].y = g[i].y - MIN_GAP;
    }
  });

  const podC = i => i===0?'#FBBF24':i===1?'#8AAFC4':i===2?'#CD7C42':'#475569';

  const spine = `
    <line x1="${AX}" y1="${PT-10}" x2="${AX}" y2="${H-PB+10}" stroke="rgba(148,163,184,.2)" stroke-width="1.5"/>
    <line x1="${AX-4}" y1="${PT}" x2="${AX+4}" y2="${PT}" stroke="rgba(148,163,184,.28)" stroke-width="1"/>
    <line x1="${AX-4}" y1="${H-PB}" x2="${AX+4}" y2="${H-PB}" stroke="rgba(148,163,184,.28)" stroke-width="1"/>
    <text x="${AX}" y="${PT-14}" text-anchor="middle" fill="#2D3F55" font-size="8" font-family="Manrope,sans-serif" font-weight="800">${numFmt.format(maxPts)} pts</text>
    <text x="${AX}" y="${H-PB+20}" text-anchor="middle" fill="#2D3F55" font-size="8" font-family="Manrope,sans-serif" font-weight="800">${numFmt.format(minPts)} pts</text>`;

  const headers = `
    <text x="${AX+14}" y="22" fill="#2D3F55" font-size="9" font-family="Manrope,sans-serif" font-weight="800">RG</text>
    <text x="${AX+40}" y="22" fill="#2D3F55" font-size="9" font-family="Manrope,sans-serif" font-weight="800">JOUEUR</text>
    <text x="${AX+244}" y="22" fill="#2D3F55" font-size="9" font-family="Manrope,sans-serif" font-weight="800" text-anchor="end">POINTS</text>`;

  const playerSvg = nodes.map(({ s, idx, color, pts, rawY, y, side }) => {
    const name = s.pseudo.length > 14 ? s.pseudo.slice(0, 13) + '…' : s.pseudo;
    const pc = podC(idx);
    const conn = side === 'right'
      ? `<line x1="${AX+5}" y1="${rawY}" x2="${AX+13}" y2="${y}" stroke="${color}" stroke-width="1" stroke-opacity=".4"/>`
      : `<line x1="${AX-5}" y1="${rawY}" x2="${AX-13}" y2="${y}" stroke="${color}" stroke-width="1" stroke-opacity=".4"/>`;

    if (side === 'right') return `
      <circle cx="${AX}" cy="${rawY}" r="5.5" fill="${color}" stroke="#0C1320" stroke-width="2.5"/>
      ${conn}
      <text x="${AX+14}" y="${y+4}" fill="${pc}" font-size="11" font-family="Oswald,sans-serif" font-weight="700">#${idx+1}</text>
      <text x="${AX+40}" y="${y+4}" fill="#F1F5F9" font-size="12" font-family="Manrope,sans-serif" font-weight="700">${esc(name)}</text>
      <text x="${AX+244}" y="${y+5}" fill="#F1F5F9" font-size="16" font-family="Oswald,sans-serif" font-weight="700" text-anchor="end">${numFmt.format(pts)}</text>
      <text x="${AX+247}" y="${y+4}" fill="#2D3F55" font-size="9" font-family="Manrope,sans-serif" font-weight="700">pts</text>`;

    return `
      <circle cx="${AX}" cy="${rawY}" r="5.5" fill="${color}" stroke="#0C1320" stroke-width="2.5"/>
      ${conn}
      <text x="${AX-14}" y="${y+4}" fill="${pc}" font-size="11" font-family="Oswald,sans-serif" font-weight="700" text-anchor="end">#${idx+1}</text>
      <text x="${AX-40}" y="${y+4}" fill="#F1F5F9" font-size="12" font-family="Manrope,sans-serif" font-weight="700" text-anchor="end">${esc(name)}</text>
      <text x="${AX-150}" y="${y+5}" fill="#F1F5F9" font-size="16" font-family="Oswald,sans-serif" font-weight="700" text-anchor="end">${numFmt.format(pts)}</text>`;
  }).join('');

  document.getElementById('points-board-inner').innerHTML =
    `<div style="padding:18px 20px 24px"><svg viewBox="0 0 ${W} ${H}" style="display:block;width:100%;height:auto;overflow:visible" role="img" aria-label="Classement par points e-SCM">
      ${headers}${spine}${playerSvg}
    </svg></div>`;
}

// ── Rank trajectory chart (SVG) ──────────────────────────────────────────
function renderRankChart(series) {
  const posKey    = rankMode === 'global' ? 'globalRank'        : 'escmRank';
  const currentKey= rankMode === 'global' ? 'currentGlobalRank' : 'currentEscmRank';
  const changeKey = rankMode === 'global' ? 'globalRankChange'  : 'escmRankChange';

  const all = series.flatMap(s => s.positions.map(p => p[posKey]));
  if (!all.length) return;

  const W = 1100, H = 480, PL = 62, PR = 192, PT = 28, PB = 50;
  const plotW = W - PL - PR, plotH = H - PT - PB;
  const minV  = Math.min(...all), maxV = Math.max(...all);
  const span  = Math.max(maxV - minV, 1);
  const maxLen= Math.max(...series.map(s => s.positions.length), 2);

  const xOf = i => PL + (i / Math.max(maxLen - 1, 1)) * plotW;
  const yOf = v => PT + ((v - minV) / span) * plotH;

  const smoothPath = coords => coords.reduce((acc, pt, i) => {
    if (i === 0) return `M ${pt[0].toFixed(1)} ${pt[1].toFixed(1)}`;
    const prev = coords[i - 1];
    const mx = ((prev[0] + pt[0]) / 2).toFixed(1);
    return `${acc} C ${mx} ${prev[1].toFixed(1)}, ${mx} ${pt[1].toFixed(1)}, ${pt[0].toFixed(1)} ${pt[1].toFixed(1)}`;
  }, '');

  // Grid
  const rankSpan = maxV - minV + 1;
  const step = rankSpan <= 8 ? 1 : rankSpan <= 16 ? 2 : rankSpan <= 32 ? 4 : 8;
  const gridVals = [];
  for (let r = minV; r <= maxV; r += step) gridVals.push(r);
  if (gridVals[gridVals.length - 1] !== maxV) gridVals.push(maxV);

  const gridSvg = gridVals.map(v => {
    const yy = yOf(v).toFixed(1);
    return `<line x1="${PL}" y1="${yy}" x2="${PL + plotW}" y2="${yy}" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
      <text x="${PL - 8}" y="${Number(yy) + 4}" fill="#2D3F55" font-size="10" font-family="Manrope,sans-serif" text-anchor="end" font-weight="700">#${v}</text>`;
  }).join('');

  const longest = [...series].sort((a,b) => b.positions.length - a.positions.length)[0];
  const tIdxs = maxLen <= 3
    ? [...Array(maxLen).keys()]
    : [...new Set([0, Math.floor((maxLen-1)/3), Math.floor(2*(maxLen-1)/3), maxLen-1])];
  const timeSvg = tIdxs.map(idx => {
    const pt = longest.positions[Math.min(idx, longest.positions.length - 1)];
    if (!pt) return '';
    return `<text x="${xOf(idx).toFixed(1)}" y="${H - 10}" fill="#2D3F55" font-size="9" font-family="Manrope,sans-serif" text-anchor="middle" font-weight="700">${dateFmt.format(new Date(pt.capturedAt))}</text>`;
  }).join('');

  const labelData = [], gradDefs = [];
  const seriesSvg = series.map((s, idx) => {
    const color  = COLORS[idx % COLORS.length];
    const coords = s.positions.map((p, i) => [xOf(i), yOf(p[posKey])]);
    if (!coords.length) return '';
    const path = smoothPath(coords), last = coords[coords.length - 1];
    const floor = (PT + plotH).toFixed(1);
    const areaPath = path + ` L ${last[0].toFixed(1)} ${floor} L ${coords[0][0].toFixed(1)} ${floor} Z`;
    const gradId = `g${idx}`;
    gradDefs.push(`<linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${color}" stop-opacity=".10"/>
      <stop offset="1" stop-color="${color}" stop-opacity="0"/>
    </linearGradient>`);

    const change   = s[changeKey] ?? 0;
    const curVal   = s[currentKey] ?? 0;
    labelData.push({ rawY: last[1], y: last[1], color, pseudo: s.pseudo, curVal, change });

    return `<path d="${areaPath}" fill="url(#${gradId})"/>
      <path d="${path}" fill="none" stroke="${color}" stroke-width="${idx === 0 ? 3 : 2}"
        stroke-opacity="${idx === 0 ? 1 : .70}" stroke-linecap="round" stroke-linejoin="round"
        class="cseries" data-series="${idx}"/>
      <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}"
        r="${idx === 0 ? 5 : 4}" fill="${color}" stroke="#0C1320" stroke-width="2.5" pointer-events="none"/>`;
  }).join('');

  // De-collide labels
  const sorted = [...labelData].sort((a,b) => a.y - b.y);
  for (let i = 1; i < sorted.length; i++)
    if (sorted[i].y - sorted[i-1].y < 20) sorted[i].y = sorted[i-1].y + 20;
  for (let i = sorted.length - 2; i >= 0; i--)
    if (sorted[i+1].y - sorted[i].y < 20) sorted[i].y = sorted[i+1].y - 20;

  const labelX  = PL + plotW + 14;
  const connSvg = sorted.map(({ rawY, y, color }) =>
    Math.abs(y - rawY) > 5
      ? `<line x1="${(PL+plotW+7).toFixed(1)}" y1="${rawY.toFixed(1)}" x2="${(labelX-2).toFixed(1)}" y2="${(y+4).toFixed(1)}" stroke="${color}" stroke-width="1" stroke-opacity=".3"/>`
      : '').join('');

  const labelsSvg = sorted.map(({ y, color, pseudo, curVal, change }) => {
    const up    = change > 0, down = change < 0;
    const dText = up ? `▲${change}` : down ? `▼${Math.abs(change)}` : '—';
    const dColor= up ? '#4ADE80' : down ? '#F87171' : '#334155';
    const name  = pseudo.length > 13 ? pseudo.slice(0, 12) + '…' : pseudo;
    return `<g>
      <text x="${labelX}" y="${(y-2).toFixed(1)}" fill="${color}" font-size="11" font-family="Manrope,sans-serif" font-weight="800">${esc(name)}</text>
      <text x="${labelX}" y="${(y+10).toFixed(1)}" fill="#475569" font-size="9" font-family="Manrope,sans-serif" font-weight="700">#${curVal} <tspan fill="${dColor}" font-weight="800">${dText}</tspan></text>
    </g>`;
  }).join('');

  document.getElementById('rank-chart').innerHTML = `<svg viewBox="0 0 ${W} ${H}" role="img"
      aria-label="Évolution e-SCM" style="display:block;width:100%;height:auto;overflow:visible">
    <defs>${gradDefs.join('')}</defs>
    <rect x="${PL}" y="${PT}" width="${plotW}" height="${plotH}" rx="8" fill="rgba(255,255,255,.008)"/>
    ${gridSvg}${seriesSvg}
    <line x1="${(PL+plotW+6).toFixed(1)}" y1="${PT}" x2="${(PL+plotW+6).toFixed(1)}" y2="${PT+plotH}" stroke="rgba(148,163,184,.07)" stroke-width="1"/>
    ${connSvg}${labelsSvg}${timeSvg}
    <line id="crosshair" x1="0" y1="${PT}" x2="0" y2="${PT+plotH}" stroke="#A855F7" stroke-width="1" stroke-dasharray="4 5" opacity=".5" pointer-events="none" visibility="hidden"/>
    <rect id="chart-hitbox" x="${PL}" y="${PT}" width="${plotW}" height="${plotH}" fill="transparent" style="cursor:crosshair"/>
  </svg>`;

  bindRankChart(series, { W, PL, PT, plotW, plotH, maxLen, xOf, posKey });
}

function bindRankChart(series, d) {
  const svg       = document.querySelector('#rank-chart svg');
  const hitbox    = document.getElementById('chart-hitbox');
  const crosshair = document.getElementById('crosshair');
  const tooltip   = document.getElementById('chart-tooltip');
  if (!svg || !hitbox) return;

  hitbox.addEventListener('mousemove', e => {
    const rect  = svg.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, ((e.clientX - rect.left) / rect.width * d.W - d.PL) / d.plotW));
    const idx   = Math.round(ratio * (d.maxLen - 1));
    const cx    = d.xOf(idx).toFixed(1);
    crosshair.setAttribute('x1', cx); crosshair.setAttribute('x2', cx);
    crosshair.setAttribute('visibility', 'visible');

    const items = series
      .map((s, i) => ({ s, i, pt: s.positions[Math.min(idx, s.positions.length-1)] }))
      .filter(x => x.pt)
      .sort((a, b) => (a.pt[d.posKey]??0) - (b.pt[d.posKey]??0));

    const ts = items[0]?.pt.capturedAt;
    tooltip.innerHTML = `<strong style="display:block;margin-bottom:8px;color:#C084FC;font-size:10px;font-weight:800">${ts ? dateFmt.format(new Date(ts)) : ''}</strong>
      ${items.map(({ s, i, pt }) => {
        const color = COLORS[i % COLORS.length];
        return `<div style="display:grid;grid-template-columns:7px 1fr auto;align-items:center;gap:6px;padding:3px 0">
          <i style="width:7px;height:7px;border-radius:50%;background:${color};display:block"></i>
          <b style="overflow:hidden;color:#94A3B8;white-space:nowrap;text-overflow:ellipsis;font-size:11px">${esc(s.pseudo)}</b>
          <em style="color:#F1F5F9;font-style:normal;font-weight:800;font-size:12px;font-family:'Oswald',sans-serif">#${pt[d.posKey]}</em>
        </div>`;
      }).join('')}`;
    tooltip.hidden = false;
    tooltip.style.left = `${Math.min(Math.max(e.clientX - rect.left + 16, 8), rect.width - 205)}px`;
    tooltip.style.top  = `${Math.max(e.clientY - rect.top - 40, 8)}px`;
  });
  hitbox.addEventListener('mouseleave', () => {
    crosshair.setAttribute('visibility', 'hidden');
    tooltip.hidden = true;
  });
}

// ── Switch between rank chart and points board ───────────────────────────
function updateView(series, liveDataAvailable) {
  const isPoints = rankMode === 'points';
  document.getElementById('rank-chart-wrap').hidden = isPoints;
  document.getElementById('points-board').hidden    = !isPoints;
  document.getElementById('chart-eyebrow').textContent = isPoints
    ? 'Progression des points' : 'Trajectoire e-SCM';
  document.getElementById('chart-title').textContent = isPoints
    ? 'Classement par points' : 'Évolution du classement';

  if (isPoints) renderPointsBoard(series, liveDataAvailable);
  else          renderRankChart(series);
}

// ── Render & load ─────────────────────────────────────────────────────────
function render(data) {
  document.getElementById('member-count').textContent =
    `${data.playerCount} membre${data.playerCount > 1 ? 's' : ''}`;
  document.getElementById('snapshot-info').textContent =
    `${data.snapshotCount} instantané${data.snapshotCount > 1 ? 's' : ''} · dernier ${data.lastCapturedAt ? dateFmt.format(new Date(data.lastCapturedAt)) : '—'}`;
  document.getElementById('diff-mode-label').textContent = data.liveDataAvailable
    ? '⚡ Δ vs classement actuel' : '⏱ Δ sur la période';
  if (data.liveDataAvailable) document.getElementById('live-badge').style.display = 'flex';
  document.getElementById('export-btn').hidden = false;

  const empty = data.snapshotCount === 0 || data.series.length === 0;
  document.getElementById('empty-state').hidden = !empty;
  document.getElementById('dashboard').hidden   = empty;
  if (empty) return;

  currentData = data;
  updateView(data.series, data.liveDataAvailable);
}

async function loadHistory() {
  document.getElementById('empty-state').hidden = true;
  document.getElementById('dashboard').hidden   = true;
  try {
    const res  = await fetch(`/api/history?days=${document.getElementById('range-select').value}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur');
    render(data);
  } catch (err) {
    document.getElementById('empty-state').hidden = false;
    document.getElementById('empty-state').querySelector('p').textContent = err.message;
  }
}

// ── Export PNG ───────────────────────────────────────────────────────────
function buildExportSVG(series, liveDataAvailable) {
  const esc2 = v => String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
  const nf = v => numFmt.format(v);
  const bySCM = [...series].sort((a,b) => a.currentEscmRank - b.currentEscmRank);
  const byPts = [...series].sort((a,b) => b.currentPoints - a.currentPoints);
  const n = bySCM.length;
  const AF = 'font-family="Arial,Helvetica,sans-serif"';
  const IF = 'font-family="Impact,Arial Black,sans-serif"';
  const podC = i => i===0?'#FBBF24':i===1?'#8AAFC4':i===2?'#CD7C42':'#6B7280';

  // ── Layout ───────────────────────────────────────────────────────────────
  const SW = 1400, HDR = 58, QW = 700;
  const QL_H = 28, ROW = 36;
  const TOP_H = QL_H + 22 + n * ROW + 20;
  // PNG export intentionally keeps only the two top boards (e-SCM ranking + points).
  const SVG_H = HDR + TOP_H + 12;

  // ── Points axis (top-right quadrant) ─────────────────────────────────────
  const AX_X = QW+200;
  const AX_PT = HDR+QL_H+22, AX_PB = 20;
  const AX_H = TOP_H-QL_H-22-AX_PB;
  const maxPts = byPts[0].currentPoints, minPts = byPts[n-1].currentPoints;
  const axRange = Math.max(maxPts-minPts, 1);
  const yOfPts = pts => AX_PT + (1-(pts-minPts)/axRange)*AX_H;

  const axNodes = byPts.map((s,idx)=>({
    s, idx, color:COLORS[idx%COLORS.length], pts:s.currentPoints,
    rawY:yOfPts(s.currentPoints), y:yOfPts(s.currentPoints), side:'right',
  }));
  for(let i=1;i<n;i++){
    const gap=axNodes[i].rawY-axNodes[i-1].rawY;
    axNodes[i].side=gap<42?(axNodes[i-1].side==='right'?'left':'right'):'right';
  }
  const flEx=HDR+TOP_H-AX_PB-6;
  ['right','left'].forEach(side=>{
    const g=axNodes.filter(nd=>nd.side===side);
    for(let i=1;i<g.length;i++) if(g[i].y-g[i-1].y<24) g[i].y=g[i-1].y+24;
    for(let i=g.length-1;i>=0;i--){if(g[i].y>flEx)g[i].y=flEx;if(i>0&&g[i-1].y>g[i].y-24)g[i-1].y=g[i].y-24;}
  });

  // ── SVG parts ────────────────────────────────────────────────────────────
  const todayStr = new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});

  const bg = `<rect width="${SW}" height="${SVG_H}" fill="#0C1320"/>`;

  const hdr = `
    <rect width="${SW}" height="${HDR}" fill="#111827"/>
    <rect x="0" y="${HDR}" width="${SW}" height="1" fill="rgba(148,163,184,.09)"/>
    <rect x="12" y="13" width="32" height="32" rx="9" fill="rgba(34,197,94,.12)" stroke="rgba(34,197,94,.28)" stroke-width="1"/>
    <text x="28" y="33" text-anchor="middle" font-size="15" ${AF} fill="#22C55E">&#x26BD;</text>
    <text x="52" y="37" ${IF} font-size="21" fill="#F1F5F9">MPP<tspan fill="#22C55E">TRACK</tspan><tspan fill="#475569"> · </tspan><tspan fill="#9333EA">e-SCM</tspan></text>
    <text x="${SW-12}" y="28" text-anchor="end" ${AF} font-size="10" fill="#475569" font-weight="bold">${esc2(todayStr)}</text>
    <text x="${SW-12}" y="44" text-anchor="end" ${AF} font-size="10" fill="#475569" font-weight="bold">${n} membres</text>`;

  // Quadrant label bars + demarcation lines
  const qlBar = (x,y,w,label,dot) => `
    <rect x="${x}" y="${y}" width="${w}" height="${QL_H}" fill="rgba(255,255,255,.022)"/>
    <rect x="${x}" y="${y+QL_H-1}" width="${w}" height="1" fill="rgba(148,163,184,.07)"/>
    <circle cx="${x+14}" cy="${y+14}" r="4" fill="${dot}"/>
    <text x="${x+24}" y="${y+19}" ${AF} font-size="10" fill="#64748B" font-weight="bold" letter-spacing="1">${label}</text>`;

  const qlBars = [
    qlBar(0,   HDR,   QW, 'CLASSEMENT e-SCM',       '#9333EA'),
    qlBar(QW,  HDR,   QW, 'PROGRESSION DES POINTS', '#22C55E'),
  ].join('');

  const divs = `
    <line x1="${QW}" y1="${HDR}" x2="${QW}" y2="${SVG_H}" stroke="rgba(148,163,184,.1)" stroke-width="1"/>`;

  // Top-left: table
  const TX=16, TY=HDR+QL_H+8, TR_Y0=TY+22;
  const C_RG=TX+44, C_ES=TX+80, C_NAME=TX+96, C_BONS=TX+316, C_EXAC=TX+364, C_PTS=TX+438;

  const tHdr = `
    <text x="${C_RG}"   y="${TY}" text-anchor="end" ${AF} font-size="9" fill="#2D3F55" font-weight="bold">#LIG</text>
    <text x="${C_ES}"   y="${TY}" text-anchor="end" ${AF} font-size="9" fill="#2D3F55" font-weight="bold">#ES</text>
    <text x="${C_NAME}" y="${TY}" ${AF} font-size="9" fill="#2D3F55" font-weight="bold">JOUEUR</text>
    <text x="${C_BONS}" y="${TY}" text-anchor="end" ${AF} font-size="9" fill="#2D3F55" font-weight="bold">BONS</text>
    <text x="${C_EXAC}" y="${TY}" text-anchor="end" ${AF} font-size="9" fill="#2D3F55" font-weight="bold">EXACTS</text>
    <text x="${C_PTS}"  y="${TY}" text-anchor="end" ${AF} font-size="9" fill="#2D3F55" font-weight="bold">PTS</text>`;

  const tRows = bySCM.map((s,i) => {
    const cy = TR_Y0+i*ROW;
    const rb = i%2===0?'rgba(255,255,255,.018)':'transparent';
    const nm = s.pseudo.length>18?s.pseudo.slice(0,17)+'…':s.pseudo;
    return `
      <rect x="${TX}" y="${cy-14}" width="${C_PTS-TX+18}" height="${ROW-2}" rx="4" fill="${rb}"/>
      <text x="${C_RG}"   y="${cy+4}" text-anchor="end" ${IF} font-size="14" fill="#475569">${s.currentGlobalRank}</text>
      <text x="${C_ES}"   y="${cy+4}" text-anchor="end" ${IF} font-size="14" fill="${podC(i)}">${s.currentEscmRank}</text>
      <text x="${C_NAME}" y="${cy+4}" ${AF} font-size="13" fill="#CBD5E1" font-weight="bold">${esc2(nm)}</text>
      <text x="${C_BONS}" y="${cy+4}" text-anchor="end" ${AF} font-size="13" fill="#94A3B8">${s.goodResults}</text>
      <text x="${C_EXAC}" y="${cy+4}" text-anchor="end" ${AF} font-size="13" fill="#94A3B8">${s.exactScores}</text>
      <text x="${C_PTS}"  y="${cy+4}" text-anchor="end" ${IF} font-size="17" fill="${podC(i)}">${nf(s.currentPoints)}</text>`;
  }).join('');

  // Top-right: points axis
  const axHdr = `
    <text x="${AX_X+14}" y="${TY}" ${AF} font-size="9" fill="#2D3F55" font-weight="bold">RG</text>
    <text x="${AX_X+40}" y="${TY}" ${AF} font-size="9" fill="#2D3F55" font-weight="bold">JOUEUR</text>
    <text x="${AX_X+268}" y="${TY}" text-anchor="end" ${AF} font-size="9" fill="#2D3F55" font-weight="bold">POINTS</text>`;

  const spine = `
    <line x1="${AX_X}" y1="${AX_PT-10}" x2="${AX_X}" y2="${HDR+TOP_H-12}" stroke="rgba(148,163,184,.2)" stroke-width="1.5"/>
    <line x1="${AX_X-4}" y1="${AX_PT}" x2="${AX_X+4}" y2="${AX_PT}" stroke="rgba(148,163,184,.28)" stroke-width="1"/>
    <line x1="${AX_X-4}" y1="${HDR+TOP_H-AX_PB}" x2="${AX_X+4}" y2="${HDR+TOP_H-AX_PB}" stroke="rgba(148,163,184,.28)" stroke-width="1"/>
    <text x="${AX_X}" y="${AX_PT-14}" text-anchor="middle" ${AF} font-size="8" fill="#2D3F55" font-weight="bold">${nf(maxPts)} pts</text>
    <text x="${AX_X}" y="${HDR+TOP_H-AX_PB+18}" text-anchor="middle" ${AF} font-size="8" fill="#2D3F55" font-weight="bold">${nf(minPts)} pts</text>`;

  const axPlayers = axNodes.map(({s,idx,color,pts,rawY,y,side}) => {
    const nm=s.pseudo.length>14?s.pseudo.slice(0,13)+'…':s.pseudo, pc=podC(idx);
    const conn=side==='right'
      ?`<line x1="${AX_X+5}" y1="${rawY}" x2="${AX_X+13}" y2="${y}" stroke="${color}" stroke-width="1" stroke-opacity=".4"/>`
      :`<line x1="${AX_X-5}" y1="${rawY}" x2="${AX_X-13}" y2="${y}" stroke="${color}" stroke-width="1" stroke-opacity=".4"/>`;
    if(side==='right') return `
      <circle cx="${AX_X}" cy="${rawY}" r="5.5" fill="${color}" stroke="#0C1320" stroke-width="2.5"/>${conn}
      <text x="${AX_X+14}" y="${y+4}" ${IF} font-size="11" fill="${pc}">#${idx+1}</text>
      <text x="${AX_X+40}" y="${y+4}" ${AF} font-size="12" fill="#CBD5E1" font-weight="bold">${esc2(nm)}</text>
      <text x="${AX_X+268}" y="${y+5}" text-anchor="end" ${IF} font-size="16" fill="#F1F5F9">${nf(pts)}</text>
      <text x="${AX_X+272}" y="${y+4}" ${AF} font-size="9" fill="#2D3F55" font-weight="bold">pts</text>`;
    return `
      <circle cx="${AX_X}" cy="${rawY}" r="5.5" fill="${color}" stroke="#0C1320" stroke-width="2.5"/>${conn}
      <text x="${AX_X-14}" y="${y+4}" text-anchor="end" ${IF} font-size="11" fill="${pc}">#${idx+1}</text>
      <text x="${AX_X-40}" y="${y+4}" text-anchor="end" ${AF} font-size="12" fill="#CBD5E1" font-weight="bold">${esc2(nm)}</text>
      <text x="${AX_X-160}" y="${y+5}" text-anchor="end" ${IF} font-size="16" fill="#F1F5F9">${nf(pts)}</text>`;
  }).join('');

  return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${SW}" height="${SVG_H}" viewBox="0 0 ${SW} ${SVG_H}">
  ${bg}${hdr}${qlBars}${divs}
  ${tHdr}${tRows}
  ${axHdr}${spine}${axPlayers}
</svg>`;
}

async function downloadExport() {
  if (!currentData || !currentData.series.length) return;
  const btn = document.getElementById('export-btn');
  const orig = btn.innerHTML;
  btn.innerHTML = '⏳';
  btn.disabled = true;
  try {
    const svgStr = buildExportSVG(currentData.series, currentData.liveDataAvailable);
    const m = svgStr.match(/width="(\d+)" height="(\d+)"/);
    const svgW = m ? +m[1] : 1120, svgH = m ? +m[2] : 600;
    const svgUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
    const img = await new Promise((res,rej) => { const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=svgUrl; });
    const sc = 2;
    const canvas = document.createElement('canvas');
    canvas.width = svgW * sc; canvas.height = svgH * sc;
    const ctx = canvas.getContext('2d');
    ctx.scale(sc, sc);
    ctx.drawImage(img, 0, 0, svgW, svgH);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `escm-${new Date().toISOString().slice(0,10)}.png`; a.click();
    URL.revokeObjectURL(url);
  } catch(e) { console.error('Export PNG:', e); }
  finally { btn.innerHTML = orig; btn.disabled = false; }
}

// ── Mode switch ──────────────────────────────────────────────────────────
function applyModeStyles() {
  document.querySelectorAll('.rank-mode-switch button').forEach(b => {
    const active = b.dataset.mode === rankMode;
    b.style.background = active ? '#9333EA' : 'transparent';
    b.style.color      = active ? '#fff'    : '#475569';
  });
}
document.querySelectorAll('.rank-mode-switch button').forEach(b => {
  b.style.cssText = 'padding:5px 11px;border:0;border-radius:6px;font:700 11px Manrope,sans-serif;cursor:pointer;transition:background .12s,color .12s';
  b.addEventListener('click', () => {
    rankMode = b.dataset.mode;
    applyModeStyles();
    if (currentData) updateView(currentData.series, currentData.liveDataAvailable);
  });
});
applyModeStyles();

document.getElementById('range-select').addEventListener('change', loadHistory);
loadHistory();
</script>
