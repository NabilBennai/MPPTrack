<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historique · MPP Track</title>
  <link rel="stylesheet" href="/css/output.css">
</head>
<body style="min-height:100dvh;background:#0C1320;color:#F1F5F9;font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased">

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header style="position:sticky;top:0;z-index:20;background:#111827;border-bottom:1px solid rgba(148,163,184,.09)">
  <div class="px-5 sm:px-8" style="height:56px;display:flex;align-items:center;gap:16px">
    <a href="/" style="display:flex;align-items:center;gap:11px;text-decoration:none">
      <div style="width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.28)">⚽</div>
      <span class="font-oswald" style="font-size:20px;font-weight:700;letter-spacing:0.14em;color:#F1F5F9">MPP<span style="color:#22C55E">TRACK</span></span>
    </a>
    <nav style="display:flex;gap:3px;margin-left:4px">
      <a href="/" style="padding:5px 10px;border-radius:7px;color:#475569;text-decoration:none;font-size:12px;font-weight:700;transition:color .12s,background .12s"
        onmouseover="this.style.color='#F1F5F9';this.style.background='rgba(255,255,255,.06)'"
        onmouseout="this.style.color='#475569';this.style.background='transparent'">Classement</a>
      <a href="/history" aria-current="page" style="padding:5px 10px;border-radius:7px;color:#F1F5F9;background:rgba(255,255,255,.06);text-decoration:none;font-size:12px;font-weight:700">Historique</a>
    </nav>
    <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
      <span id="live-badge" style="display:none;align-items:center;gap:6px;font-size:11px;color:#475569;font-weight:700">
        <span style="width:6px;height:6px;border-radius:50%;background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,.2)"></span>LIVE
      </span>
      <label style="display:flex;align-items:center;gap:8px;font-size:11px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.08em">
        Période
        <select id="range-select" style="border-radius:8px;padding:5px 9px;font-size:12px;font-family:'Manrope',sans-serif;cursor:pointer;outline:none;border:1px solid rgba(148,163,184,.12);color:#F1F5F9;background:#1A2335">
          <option value="1">24 heures</option>
          <option value="7" selected>7 jours</option>
          <option value="30">30 jours</option>
          <option value="90">90 jours</option>
        </select>
      </label>
    </div>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<main class="px-5 sm:px-8" style="max-width:1440px;margin:0 auto;padding-top:20px;padding-bottom:48px">

  <!-- Info strip -->
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:8px;padding:5px 11px;border-radius:9px;background:rgba(147,51,234,.08);border:1px solid rgba(147,51,234,.2)">
      <span style="width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:#9333EA;color:#fff;font:700 10px 'Oswald',sans-serif">ES</span>
      <span style="font-size:11px;font-weight:800;color:#C084FC;text-transform:uppercase;letter-spacing:.1em">e-SCM</span>
      <span id="member-count" style="font-size:11px;color:#64748B;font-weight:700"></span>
    </div>
    <span id="snapshot-info" style="font-size:11px;color:#475569;font-weight:600"></span>
    <span id="diff-mode-label" style="margin-left:auto;font-size:10px;color:#334155;font-weight:700;text-transform:uppercase;letter-spacing:.08em"></span>
  </div>

  <!-- Empty state -->
  <div id="empty-state" hidden style="padding:72px 24px;text-align:center;border:1px dashed rgba(148,163,184,.15);border-radius:16px;background:rgba(34,197,94,.03)">
    <div style="width:52px;height:52px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:#22C55E;background:rgba(34,197,94,.10);font-size:26px">⌁</div>
    <h2 class="font-oswald" style="font-size:24px;color:#F1F5F9;letter-spacing:.04em">CHRONOLOGIE VIDE</h2>
    <p style="max-width:480px;margin:8px auto 16px;color:#64748B;font-size:13px">Aucun instantané enregistré pour cette période. Le premier apparaîtra après l'exécution du cron.</p>
    <code style="color:#22C55E;font-size:11px">GET /api/cron/snapshot</code>
  </div>

  <!-- Chart panel (full width) -->
  <div id="dashboard" hidden style="border:1px solid rgba(148,163,184,.09);border-radius:16px;background:#111827;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.3)">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div>
        <p style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:#475569">Trajectoire e-SCM</p>
        <h2 class="font-oswald" style="font-size:18px;letter-spacing:.04em;color:#F1F5F9;margin-top:3px">Évolution du classement</h2>
      </div>
      <div class="rank-mode-switch" role="group" style="display:flex;gap:3px;padding:3px;border:1px solid rgba(148,163,184,.09);border-radius:9px;background:#0C1320">
        <button type="button" data-mode="global" data-active style="padding:5px 11px;border:0;border-radius:6px;font:700 11px 'Manrope',sans-serif;cursor:pointer;background:#9333EA;color:#fff;transition:background .12s,color .12s">Rang global</button>
        <button type="button" data-mode="escm" style="padding:5px 11px;border:0;border-radius:6px;font:700 11px 'Manrope',sans-serif;cursor:pointer;background:transparent;color:#475569;transition:background .12s,color .12s">Rang e-SCM</button>
      </div>
    </div>
    <div style="position:relative;border:1px solid rgba(147,51,234,.1);border-radius:12px;background:radial-gradient(ellipse at 50% -10%,rgba(147,51,234,.06),transparent 55%),#0C1320;overflow:hidden">
      <div id="chart-tooltip" hidden style="position:absolute;z-index:4;min-width:180px;padding:10px 12px;border:1px solid rgba(147,51,234,.28);border-radius:10px;background:rgba(15,20,30,.97);box-shadow:0 12px 32px rgba(0,0,0,.6);pointer-events:none;backdrop-filter:blur(10px)"></div>
      <div id="points-chart" style="width:100%;min-height:480px"></div>
    </div>
  </div>
</main>

<script>
const COLORS = ['#A855F7','#22C55E','#3B9EFF','#FBBF24','#F97316','#06B6D4','#F43F5E','#8B5CF6'];
const dateFmt = new Intl.DateTimeFormat('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', timeZone:'Europe/Paris' });
const esc = v => String(v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
let rankMode = 'global';
let currentData = null;

function fmtDelta(n) {
  if (n === 0) return '—';
  return (n > 0 ? '▲' : '▼') + Math.abs(n);
}
function deltaColor(n) {
  return n > 0 ? '#4ADE80' : n < 0 ? '#F87171' : '#475569';
}

function renderChart(series, liveDataAvailable) {
  const rankKey     = rankMode === 'global' ? 'globalRank'     : 'escmRank';
  const currentKey  = rankMode === 'global' ? 'currentGlobalRank' : 'currentEscmRank';
  const lastSnapKey = rankMode === 'global' ? 'lastSnapshotGlobalRank' : 'lastSnapshotEscmRank';
  const changeKey   = rankMode === 'global' ? 'globalRankChange' : 'escmRankChange';

  const all = series.flatMap(s => s.positions.map(p => p[rankKey]));
  if (!all.length) return;

  // SVG dimensions — extra right padding for end-labels
  const W = 1100, H = 480, PL = 54, PR = 190, PT = 28, PB = 50;
  const plotW = W - PL - PR;
  const plotH = H - PT - PB;
  const minR = Math.max(1, Math.min(...all));
  const maxR = Math.max(...all);
  const span = Math.max(maxR - minR, 1);
  const maxLen = Math.max(...series.map(s => s.positions.length), 2);

  const xOf = i => PL + (i / (maxLen - 1)) * plotW;
  // Y: rank 1 (best) at TOP → low y value
  const yOf = v => PT + ((v - minR) / span) * plotH;

  // Smooth bezier path
  const smoothPath = coords => coords.reduce((p, pt, i) => {
    if (i === 0) return `M ${pt[0].toFixed(1)} ${pt[1].toFixed(1)}`;
    const prev = coords[i - 1];
    const mx = ((prev[0] + pt[0]) / 2).toFixed(1);
    return `${p} C ${mx} ${prev[1].toFixed(1)}, ${mx} ${pt[1].toFixed(1)}, ${pt[0].toFixed(1)} ${pt[1].toFixed(1)}`;
  }, '');

  // Grid lines — show integer ranks, nicely spaced
  const rankCount = maxR - minR + 1;
  const step = rankCount <= 8 ? 1 : rankCount <= 16 ? 2 : rankCount <= 32 ? 4 : 8;
  const gridRanks = [];
  for (let r = minR; r <= maxR; r += step) gridRanks.push(r);
  if (gridRanks[gridRanks.length - 1] !== maxR) gridRanks.push(maxR);

  const gridSvg = gridRanks.map(r => {
    const yy = yOf(r).toFixed(1);
    return `<line x1="${PL}" y1="${yy}" x2="${PL + plotW}" y2="${yy}" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
      <text x="${PL - 10}" y="${Number(yy) + 4}" fill="#2D3F55" font-size="10" font-family="Manrope,sans-serif" text-anchor="end" font-weight="700">#${r}</text>`;
  }).join('');

  // Time axis labels
  const longest = [...series].sort((a,b) => b.positions.length - a.positions.length)[0];
  const labelIdxs = maxLen <= 3
    ? [...Array(maxLen).keys()]
    : [...new Set([0, Math.floor((maxLen-1)/3), Math.floor(2*(maxLen-1)/3), maxLen-1])];
  const timeSvg = labelIdxs.map(idx => {
    const pt = longest.positions[Math.min(idx, longest.positions.length - 1)];
    if (!pt) return '';
    return `<text x="${xOf(idx).toFixed(1)}" y="${H - 10}" fill="#2D3F55" font-size="9" font-family="Manrope,sans-serif" text-anchor="middle" font-weight="700">${dateFmt.format(new Date(pt.capturedAt))}</text>`;
  }).join('');

  // Build series SVG + collect label positions
  const labelData = [];
  const gradDefs = [];
  const seriesSvg = series.map((s, idx) => {
    const color = COLORS[idx % COLORS.length];
    const coords = s.positions.map((p, i) => [xOf(i), yOf(p[rankKey])]);
    if (!coords.length) return '';
    const path = smoothPath(coords);
    const lastCoord = coords[coords.length - 1];
    const lastRank  = s.positions[s.positions.length - 1][rankKey];
    const gradId = `g${idx}`;

    gradDefs.push(`<linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${color}" stop-opacity=".12"/>
      <stop offset="1" stop-color="${color}" stop-opacity="0"/>
    </linearGradient>`);

    const areaCoords = [...coords, [lastCoord[0], PT + plotH], [coords[0][0], PT + plotH]];
    const areaPath = smoothPath(coords) + ` L ${lastCoord[0].toFixed(1)} ${(PT+plotH).toFixed(1)} L ${coords[0][0].toFixed(1)} ${(PT+plotH).toFixed(1)} Z`;

    const change = s[changeKey];
    const liveRank = s[currentKey];
    labelData.push({ y: lastCoord[1], color, pseudo: s.pseudo, rank: liveRank, change, liveDataAvailable, idx });

    return `<path d="${areaPath}" fill="url(#${gradId})"/>
      <path d="${path}" fill="none" stroke="${color}" stroke-width="${idx === 0 ? 3 : 2}" stroke-opacity="${idx === 0 ? 1 : .72}" stroke-linecap="round" stroke-linejoin="round" class="cseries" data-series="${idx}">
        <title>${esc(s.pseudo)} · #${lastRank}</title>
      </path>
      <circle cx="${lastCoord[0].toFixed(1)}" cy="${lastCoord[1].toFixed(1)}" r="${idx === 0 ? 5 : 4}" fill="${color}" stroke="#0C1320" stroke-width="2.5" pointer-events="none"/>`;
  }).join('');

  // De-collide end labels
  const MIN_GAP = 20;
  const sorted = [...labelData].sort((a, b) => a.y - b.y);
  // push downward pass
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i].y - sorted[i-1].y < MIN_GAP)
      sorted[i].y = sorted[i-1].y + MIN_GAP;
  }
  // push upward pass
  for (let i = sorted.length - 2; i >= 0; i--) {
    if (sorted[i+1].y - sorted[i].y < MIN_GAP)
      sorted[i].y = sorted[i+1].y - MIN_GAP;
  }

  const labelX = PL + plotW + 14;
  const labelsSvg = sorted.map(({ y, color, pseudo, rank, change, liveDataAvailable }) => {
    const dText = fmtDelta(change);
    const dColor = deltaColor(change);
    const truncPseudo = pseudo.length > 12 ? pseudo.slice(0, 11) + '…' : pseudo;
    return `<g>
      <text x="${labelX}" y="${(y - 2).toFixed(1)}" fill="${color}" font-size="11" font-family="Manrope,sans-serif" font-weight="800">${esc(truncPseudo)}</text>
      <text x="${labelX}" y="${(y + 10).toFixed(1)}" fill="#475569" font-size="9" font-family="Manrope,sans-serif" font-weight="700">#${rank} <tspan fill="${dColor}" font-weight="800">${dText}</tspan></text>
    </g>`;
  }).join('');

  // Vertical separator before labels
  const sepX = (PL + plotW + 6).toFixed(1);
  const sepSvg = `<line x1="${sepX}" y1="${PT}" x2="${sepX}" y2="${PT+plotH}" stroke="rgba(148,163,184,.07)" stroke-width="1"/>`;

  document.getElementById('points-chart').innerHTML = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Évolution des rangs e-SCM" style="display:block;width:100%;height:auto;overflow:visible">
    <defs>${gradDefs.join('')}</defs>
    <rect x="${PL}" y="${PT}" width="${plotW}" height="${plotH}" rx="8" fill="rgba(255,255,255,.008)"/>
    ${gridSvg}
    ${seriesSvg}
    ${sepSvg}
    ${labelsSvg}
    ${timeSvg}
    <line id="crosshair" x1="0" y1="${PT}" x2="0" y2="${PT+plotH}" stroke="#A855F7" stroke-width="1" stroke-dasharray="4 5" opacity=".5" pointer-events="none" visibility="hidden"/>
    <rect id="chart-hitbox" x="${PL}" y="${PT}" width="${plotW}" height="${plotH}" fill="transparent" style="cursor:crosshair"/>
  </svg>`;

  bindChart(series, { W, PL, PT, plotW, plotH, maxLen, xOf, rankKey, currentKey, changeKey });
}

function bindChart(series, d) {
  const svg = document.querySelector('#points-chart svg');
  const hitbox = document.getElementById('chart-hitbox');
  const crosshair = document.getElementById('crosshair');
  const tooltip = document.getElementById('chart-tooltip');

  const highlight = idx => {
    svg.querySelectorAll('.cseries').forEach(p => {
      const active = idx === null || Number(p.dataset.series) === idx;
      p.style.opacity = active ? '1' : '.08';
      if (active && idx !== null) p.style.strokeWidth = '4';
      else p.style.strokeWidth = '';
    });
  };

  hitbox.addEventListener('mousemove', e => {
    const rect = svg.getBoundingClientRect();
    const svgX = (e.clientX - rect.left) / rect.width * d.W;
    const ratio = Math.max(0, Math.min(1, (svgX - d.PL) / d.plotW));
    const snapIdx = Math.round(ratio * (d.maxLen - 1));
    const cx = d.xOf(snapIdx);
    crosshair.setAttribute('x1', cx.toFixed(1)); crosshair.setAttribute('x2', cx.toFixed(1)); crosshair.setAttribute('visibility', 'visible');

    const items = series
      .map((s, i) => ({ s, i, pt: s.positions[Math.min(snapIdx, s.positions.length - 1)] }))
      .filter(x => x.pt)
      .sort((a, b) => a.pt[d.rankKey] - b.pt[d.rankKey]);

    const ts = items[0]?.pt.capturedAt;
    tooltip.innerHTML = `<strong style="display:block;margin-bottom:8px;color:#C084FC;font-size:10px;font-weight:800">${ts ? dateFmt.format(new Date(ts)) : ''}</strong>
      ${items.map(({ s, i, pt }) => {
        const color = COLORS[i % COLORS.length];
        return `<div style="display:grid;grid-template-columns:7px 1fr auto;align-items:center;gap:6px;padding:3px 0">
          <i style="width:7px;height:7px;border-radius:50%;background:${color};display:block"></i>
          <b style="overflow:hidden;color:#94A3B8;white-space:nowrap;text-overflow:ellipsis;font-size:11px">${esc(s.pseudo)}</b>
          <em style="color:#F1F5F9;font-style:normal;font-weight:800;font-size:12px;font-family:'Oswald',sans-serif">#${pt[d.rankKey]}</em>
        </div>`;
      }).join('')}`;
    tooltip.hidden = false;
    const tipLeft = Math.min(Math.max(e.clientX - rect.left + 16, 8), rect.width - 210);
    tooltip.style.left = `${tipLeft}px`;
    tooltip.style.top = `${Math.max(e.clientY - rect.top - 40, 8)}px`;
  });
  hitbox.addEventListener('mouseleave', () => {
    crosshair.setAttribute('visibility', 'hidden');
    tooltip.hidden = true;
    highlight(null);
  });
}

function render(data) {
  document.getElementById('member-count').textContent = `${data.playerCount} membre${data.playerCount > 1 ? 's' : ''}`;
  document.getElementById('snapshot-info').textContent =
    `${data.snapshotCount} instantané${data.snapshotCount > 1 ? 's' : ''} · dernier ${data.lastCapturedAt ? dateFmt.format(new Date(data.lastCapturedAt)) : '—'}`;

  const diffLabel = document.getElementById('diff-mode-label');
  diffLabel.textContent = data.liveDataAvailable
    ? '⚡ Δ vs classement actuel'
    : '⏱ Δ sur la période';

  if (data.liveDataAvailable) document.getElementById('live-badge').style.display = 'flex';

  const empty = data.snapshotCount === 0 || data.series.length === 0;
  document.getElementById('empty-state').hidden = !empty;
  document.getElementById('dashboard').hidden = empty;
  if (empty) return;

  currentData = data;
  renderChart(data.series, data.liveDataAvailable);
}

async function loadHistory() {
  document.getElementById('empty-state').hidden = true;
  document.getElementById('dashboard').hidden = true;
  try {
    const res = await fetch(`/api/history?days=${document.getElementById('range-select').value}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur');
    render(data);
  } catch (err) {
    document.getElementById('empty-state').hidden = false;
    document.getElementById('empty-state').querySelector('p').textContent = err.message;
  }
}

document.querySelectorAll('.rank-mode-switch button').forEach(btn => {
  btn.addEventListener('click', () => {
    rankMode = btn.dataset.mode;
    document.querySelectorAll('.rank-mode-switch button').forEach(b => {
      const active = b === btn;
      b.setAttribute('data-active', active ? '' : null);
      b.style.background = active ? '#9333EA' : 'transparent';
      b.style.color = active ? '#fff' : '#475569';
      if (!active) b.removeAttribute('data-active');
    });
    if (currentData) renderChart(currentData.series, currentData.liveDataAvailable);
  });
});

document.getElementById('range-select').addEventListener('change', loadHistory);
loadHistory();
</script>
</body>
</html>
